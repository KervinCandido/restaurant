spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/${DB_NAME:restaurant_backend_db}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:restaurant_backend_user}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:restaurant_backend_password}}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    table: history_flyway

server:
  port: ${SERVER_PORT:8080}
